{% extends "base.html" %}
{% block title %}New Sale — Shubham Tradelink{% endblock %}

{% block content %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<h1 class="text-2xl font-bold mb-6">New Sale</h1>

<form method="POST" action="/sales/add" id="saleForm"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5 max-w-lg">

  <!-- ─── Customer Section ──────────────────────────────── -->
  <div class="border-b border-gray-100 pb-5">
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Customer Details</h2>

    <!-- Phone lookup -->
    <div>
      <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
      <div class="flex gap-2">
        <input type="tel" id="phone" name="phone" required placeholder="Enter 10-digit number"
               class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
        <button type="button" id="searchBtn"
                class="bg-gray-700 hover:bg-gray-800 text-white text-sm font-medium rounded-lg px-4 py-2 transition">
          Search
        </button>
      </div>
      <p id="customerStatus" class="mt-1 text-xs text-gray-400"></p>
    </div>

    <!-- Hidden customer ID (filled if existing customer found) -->
    <input type="hidden" name="customer_id" id="customer_id" />
    <!-- Flag: is this a new customer? -->
    <input type="hidden" name="is_new_customer" id="is_new_customer" value="true" />

    <!-- Existing customer info (shown when found) -->
    <div id="existingCustomerInfo" class="hidden mt-3 bg-brand-50 border border-brand-100 rounded-lg p-4 space-y-1 text-sm">
      <p><span class="text-gray-500">Name:</span> <strong id="custNameDisplay"></strong></p>
      <p><span class="text-gray-500">Vehicle:</span> <span id="custVehicleDisplay"></span></p>
      <p><span class="text-gray-500">Vehicle No:</span> <span id="custVehicleNumDisplay"></span></p>
    </div>

    <!-- New customer fields (shown when customer not found) -->
    <div id="newCustomerFields" class="mt-3 space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Rajesh Kumar"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
      </div>
      <div>
        <label for="vehicle" class="block text-sm font-medium text-gray-700 mb-1">Vehicle</label>
        <input type="text" id="vehicle" name="vehicle" placeholder="e.g. Maruti Swift"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
      </div>
      <div>
        <label for="vehicle_number" class="block text-sm font-medium text-gray-700 mb-1">Vehicle Number</label>
        <input type="text" id="vehicle_number" name="vehicle_number" placeholder="e.g. MH 12 AB 1234"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
      </div>
    </div>
  </div>

  <!-- ─── Sale Section ──────────────────────────────────── -->
  <div>
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Sale Details</h2>

    <!-- Sale Date (DD/MM/YYYY) -->
    <div class="mb-4">
      <label for="sale_date" class="block text-sm font-medium text-gray-700 mb-1">Sale Date</label>
      <input type="text" id="sale_date" name="sale_date" required
             value="{{ today }}" placeholder="DD/MM/YYYY" maxlength="10"
             pattern="\d{2}/\d{2}/\d{4}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
      <p class="mt-1 text-xs text-gray-400">Format: DD/MM/YYYY</p>
    </div>

    <!-- Battery Selection -->
    <div class="mb-4">
      <label for="battery_id" class="block text-sm font-medium text-gray-700 mb-1">Battery</label>
      <select id="battery_id" name="battery_id" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition bg-white">
        <option value="">— Select battery —</option>
        {% for b in batteries %}
          <option value="{{ b._id }}" data-price="{{ b.selling_price }}">{{ b.brand }} {{ b.model }} (stock: {{ b.stock }})</option>
        {% endfor %}
      </select>
    </div>

    <!-- Serial Number with Scanner -->
    <div class="mb-4">
      <label for="serial_number" class="block text-sm font-medium text-gray-700 mb-1">Serial Number</label>
      <div class="flex gap-2">
        <input type="text" id="serial_number" name="serial_number" required placeholder="e.g. EX-2024-00123"
               class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
        <button type="button" id="scanBtn"
                class="bg-gray-700 hover:bg-gray-800 text-white rounded-lg px-3 py-2 transition flex items-center"
                title="Scan barcode / QR code">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
        </button>
      </div>
    </div>

    <!-- Price -->
    <div class="mb-4">
      <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Price (₹)</label>
      <input type="number" step="0.01" id="price" name="price" required min="0" placeholder="0.00"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    </div>

    <!-- Payment Mode -->
    <div class="mb-4">
      <label for="payment_mode" class="block text-sm font-medium text-gray-700 mb-1">Payment Mode</label>
      <select id="payment_mode" name="payment_mode" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition bg-white">
        <option value="">— Select —</option>
        <option value="Cash">Cash</option>
        <option value="UPI">UPI</option>
        <option value="Card">Card</option>
        <option value="Credit">Credit</option>
      </select>
    </div>

    <!-- Service Type -->
    <div class="mb-4">
      <label for="service" class="block text-sm font-medium text-gray-700 mb-1">Service Type</label>
      <select id="service" name="service" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition bg-white">
        <option value="">— Select —</option>
        <option value="Installation">Installation</option>
        <option value="Charging">Charging</option>
        <option value="Exchange">Exchange</option>
      </select>
    </div>
  </div>

  <button type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition">
    Record Sale
  </button>
</form>

<!-- ─── JavaScript ───────────────────────────────────────── -->
<script>
  const searchBtn = document.getElementById('searchBtn');
  const phoneInput = document.getElementById('phone');
  const customerIdInput = document.getElementById('customer_id');
  const isNewInput = document.getElementById('is_new_customer');
  const existingInfo = document.getElementById('existingCustomerInfo');
  const newFields = document.getElementById('newCustomerFields');
  const statusText = document.getElementById('customerStatus');

  // Show new-customer fields by default
  function showNewCustomerMode() {
    existingInfo.classList.add('hidden');
    newFields.classList.remove('hidden');
    customerIdInput.value = '';
    isNewInput.value = 'true';
  }

  function showExistingCustomerMode(data) {
    newFields.classList.add('hidden');
    existingInfo.classList.remove('hidden');
    customerIdInput.value = data.customer_id;
    isNewInput.value = 'false';
    document.getElementById('custNameDisplay').textContent = data.name;
    document.getElementById('custVehicleDisplay').textContent = data.vehicle;
    document.getElementById('custVehicleNumDisplay').textContent = data.vehicle_number;
  }

  // Search button click
  searchBtn.addEventListener('click', function () {
    const phone = phoneInput.value.trim();
    if (!phone) return;

    fetch('/customers/search?phone=' + encodeURIComponent(phone))
      .then(r => r.json())
      .then(data => {
        if (data.found) {
          showExistingCustomerMode(data);
          statusText.textContent = 'Existing customer found ✓';
          statusText.className = 'mt-1 text-xs text-green-600 font-medium';
        } else {
          showNewCustomerMode();
          statusText.textContent = 'New customer — fill in details below';
          statusText.className = 'mt-1 text-xs text-amber-600 font-medium';
        }
      });
  });

  // Auto-fill selling price when battery is selected
  document.getElementById('battery_id').addEventListener('change', function () {
    const selected = this.options[this.selectedIndex];
    const price = selected.getAttribute('data-price');
    if (price) {
      document.getElementById('price').value = price;
    }
  });

  // Auto-format date as DD/MM/YYYY while typing
  document.getElementById('sale_date').addEventListener('input', function (e) {
    let val = this.value.replace(/\D/g, '');
    if (val.length > 8) val = val.substring(0, 8);
    if (val.length >= 5) {
      this.value = val.substring(0, 2) + '/' + val.substring(2, 4) + '/' + val.substring(4);
    } else if (val.length >= 3) {
      this.value = val.substring(0, 2) + '/' + val.substring(2);
    } else {
      this.value = val;
    }
  });

  // ─── Barcode / QR Scanner ───────────────────────────────
  let html5QrCode = null;

  document.getElementById('scanBtn').addEventListener('click', function () {
    document.getElementById('scannerModal').classList.remove('hidden');
    startScanner();
  });

  function startScanner() {
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      function onScanSuccess(decodedText) {
        document.getElementById('serial_number').value = decodedText;
        closeScanner();
      },
      function onScanFailure(error) {}
    ).catch(function (err) {
      alert("Camera access denied. Please allow camera permission.");
      closeScanner();
    });
  }

  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
      html5QrCode = null;
    }
  }
</script>

<!-- Scanner Modal -->
<div id="scannerModal" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/60" onclick="closeScanner()"></div>
  <div class="relative mx-auto mt-16 max-w-sm bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
      <h3 class="text-sm font-semibold text-gray-700">Scan Barcode / QR Code</h3>
      <button onclick="closeScanner()" class="text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="qr-reader" style="width: 100%;"></div>
    <p class="text-center text-xs text-gray-400 py-3">Point camera at the barcode or QR code</p>
  </div>
</div>
{% endblock %}
