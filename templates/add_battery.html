{% extends "base.html" %}
{% block title %}Add Battery — Shubham Tradelink{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Add Battery</h1>

<form method="POST" action="/inventory/add"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5 max-w-lg">

  <div>
    <label for="brand" class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
    <input type="text" id="brand" name="brand" required placeholder="e.g. Exide"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="model" class="block text-sm font-medium text-gray-700 mb-1">Model</label>
    <input type="text" id="model" name="model" required placeholder="e.g. MRED700"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity</label>
    <input type="number" id="stock" name="stock" required min="0" placeholder="e.g. 10"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="purchase_price" class="block text-sm font-medium text-gray-700 mb-1">Purchase Price (₹)</label>
      <input type="number" step="0.01" id="purchase_price" name="purchase_price" required min="0" placeholder="0.00"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    </div>
    <div>
      <label for="selling_price" class="block text-sm font-medium text-gray-700 mb-1">Selling Price (₹)</label>
      <input type="number" step="0.01" id="selling_price" name="selling_price" required min="0" placeholder="0.00"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    </div>
  </div>

  <div>
    <label for="warranty_months" class="block text-sm font-medium text-gray-700 mb-1">Warranty Period (months)</label>
    <input type="number" id="warranty_months" name="warranty_months" required min="0" value="12" placeholder="e.g. 12"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    <p class="mt-1 text-xs text-gray-400">Default: 12 months</p>
  </div>

  <button type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition">
    Add to Inventory
  </button>
</form>
{% endblock %}
