{% extends "base.html" %}
{% block title %}Add Battery — Shubham Tradelink{% endblock %}

{% block content %}
<div class="flex items-center justify-between gap-3 mb-4">
  <div>
    <h1 class="text-xl font-bold text-ink-900">Add Battery</h1>
    <p class="text-[12px] text-ink-500">Add a new battery model to inventory</p>
  </div>
  <a href="/inventory" class="text-[12px] font-medium text-ink-500 hover:text-ink-800 transition">← Inventory</a>
</div>

<form method="POST" action="/inventory/add" class="max-w-lg mx-auto">
  <div class="bg-white border border-ink-200 rounded-lg shadow-card">
    <div class="px-4 py-2.5 border-b border-ink-100">
      <h2 class="text-[12px] font-bold text-ink-500 uppercase tracking-wider">Battery Details</h2>
    </div>
    <div class="p-4 space-y-3">

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="brand" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Brand</label>
          <input type="text" id="brand" name="brand" required placeholder="e.g. Exide"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
        </div>
        <div>
          <label for="model" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Model</label>
          <input type="text" id="model" name="model" required placeholder="e.g. MRED700"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
        </div>
      </div>

      <div>
        <label for="stock" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Initial Stock</label>
        <input type="number" id="stock" name="stock" required min="0" placeholder="0"
               class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="purchase_price" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Purchase Price (₹)</label>
          <input type="number" step="0.01" id="purchase_price" name="purchase_price" required min="0" placeholder="0"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm tabular focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
        </div>
        <div>
          <label for="selling_price" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Selling Price (₹)</label>
          <input type="number" step="0.01" id="selling_price" name="selling_price" required min="0" placeholder="0"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm tabular focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
        </div>
      </div>

      <!-- Live margin preview -->
      <div id="marginPreview" class="hidden flex items-center justify-between bg-ink-50 border border-ink-100 rounded-md px-3 py-2">
        <span class="text-[11px] font-semibold text-ink-500 uppercase tracking-wider">Margin</span>
        <span id="marginVal" class="text-[13px] font-bold tabular"></span>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="mechanic_price" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Mechanic Price (₹)</label>
          <input type="number" step="0.01" id="mechanic_price" name="mechanic_price" min="0" value="0" placeholder="0"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm tabular focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
          <p class="mt-1 text-[10px] text-ink-500">0 = use selling price</p>
        </div>
        <div>
          <label for="default_old_battery_value" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Exchange Value (₹)</label>
          <input type="number" step="0.01" id="default_old_battery_value" name="default_old_battery_value" min="0" value="0" placeholder="0"
                 class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm tabular focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
          <p class="mt-1 text-[10px] text-ink-500">Auto-filled on sale</p>
        </div>
      </div>

      <div>
        <label for="warranty_months" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Warranty Period (months)</label>
        <input type="number" id="warranty_months" name="warranty_months" required min="0" value="12"
               class="w-full border border-ink-300 rounded-md px-3 py-2 text-sm focus:ring-2 focus:ring-accent-400/40 focus:border-accent-500 outline-none transition" />
      </div>

    </div>
  </div>

  <div class="flex gap-3 mt-4">
    <button type="submit"
            class="flex-1 bg-accent-500 hover:bg-accent-600 text-ink-900 font-bold rounded-md px-4 py-2.5 text-sm active:scale-[0.99] transition shadow-sm">
      Add to Inventory
    </button>
    <a href="/inventory"
       class="flex-1 text-center border border-ink-300 text-ink-700 font-medium rounded-md px-4 py-2.5 text-sm hover:bg-ink-50 transition">
      Cancel
    </a>
  </div>
</form>

<script>
  function updateMargin() {
    const buy = parseFloat(document.getElementById('purchase_price').value) || 0;
    const sell = parseFloat(document.getElementById('selling_price').value) || 0;
    const preview = document.getElementById('marginPreview');
    const val = document.getElementById('marginVal');
    if (buy > 0 && sell > 0) {
      const m = (sell - buy) / sell * 100;
      val.textContent = '₹' + (sell - buy).toLocaleString('en-IN') + ' · ' + m.toFixed(1) + '%';
      val.className = 'text-[13px] font-bold tabular ' + (m >= 20 ? 'text-emerald-700' : m >= 10 ? 'text-accent-700' : 'text-rose-600');
      preview.classList.remove('hidden');
    } else {
      preview.classList.add('hidden');
    }
  }
  document.getElementById('purchase_price').addEventListener('input', updateMargin);
  document.getElementById('selling_price').addEventListener('input', updateMargin);
</script>
{% endblock %}
