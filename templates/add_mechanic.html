{% extends "base.html" %}
{% block title %}Add Mechanic — Shubham Tradelink{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Add Mechanic</h1>

<form method="POST" action="/mechanics/add"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5 max-w-lg">
  <div>
    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
    <input type="text" id="name" name="name" required placeholder="e.g. Suresh"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <div>
    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
    <input type="tel" id="phone" name="phone" required placeholder="10-digit mobile number"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <div>
    <label for="shop_name" class="block text-sm font-medium text-gray-700 mb-1">Shop / Garage Name <span class="text-gray-400">(optional)</span></label>
    <input type="text" id="shop_name" name="shop_name" placeholder="e.g. Suresh Auto Works"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <button type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition">
    Add Mechanic
  </button>
</form>
{% endblock %}
