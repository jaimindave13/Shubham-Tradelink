<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Shubham Tradelink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#eef6ff', 100: '#d9eaff', 200: '#bcdaff',
              300: '#8ec3ff', 400: '#59a1ff', 500: '#3380ff',
              600: '#1a5ef5', 700: '#1349e1', 800: '#163db6', 900: '#18378f',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="font-sans bg-gradient-to-br from-gray-900 via-slate-900 to-gray-950 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-600 text-white mb-4 shadow-lg shadow-brand-600/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 6h1a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h1m4-2h4v2h-4V4z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Shubham Tradelink</h1>
      <p class="text-sm text-gray-400 mt-1">Sign in to manage your shop</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
            {% if category == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30
            {% elif category == 'success' %}bg-green-500/20 text-green-300 border border-green-500/30
            {% else %}bg-blue-500/20 text-blue-300 border border-blue-500/30{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Card -->
    <form method="POST" action="/login"
          class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl p-6 space-y-5 shadow-2xl">

      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="Enter username"
               class="w-full bg-white/10 border border-white/20 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password"
               class="w-full bg-white/10 border border-white/20 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition" />
      </div>

      <button type="submit"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl px-4 py-3 text-sm hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-brand-600/30">
        Sign In
      </button>
    </form>

    <p class="text-center text-xs text-gray-600 mt-6">Shubham Tradelink © 2026</p>
  </div>

</body>
</html>
