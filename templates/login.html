<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Shubham Tradelink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            accent: {
              400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
            },
            ink: {
              400: '#94a3b8', 500: '#64748b', 700: '#334155',
              800: '#1e293b', 900: '#0f172a', 950: '#0b1220',
            },
          }
        }
      }
    }
  </script>

  <style>
    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(245, 158, 11, 0.10), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(61, 90, 131, 0.18), transparent 50%),
        linear-gradient(180deg, #0b1220 0%, #060a14 100%);
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
  </style>
</head>

<body class="font-sans min-h-screen flex items-center justify-center px-4 grid-bg">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-accent-500 text-ink-900 mb-4 shadow-lg shadow-accent-500/30 ring-1 ring-accent-400/40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path stroke-linecap="round" stroke-linejoin="round" d="M17 6h1a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h1m4-2h4v2h-4V4z"/></svg>
      </div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">Shubham Tradelink</h1>
      <p class="text-[13px] text-ink-400 mt-1">Battery Shop POS · sign in to continue</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-2.5 rounded-lg text-[13px] font-medium border
            {% if category == 'error' %}bg-rose-500/10 text-rose-300 border-rose-500/30
            {% elif category == 'success' %}bg-emerald-500/10 text-emerald-300 border-emerald-500/30
            {% else %}bg-accent-500/10 text-accent-300 border-accent-500/30{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Card -->
    <form method="POST" action="/login"
          class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 space-y-4 shadow-2xl">

      <div>
        <label for="username" class="block text-[12px] font-semibold text-ink-400 uppercase tracking-wider mb-1.5">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="admin"
               class="w-full bg-white/5 border border-white/10 text-white placeholder-ink-500 rounded-lg px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500 outline-none transition" />
      </div>

      <div>
        <label for="password" class="block text-[12px] font-semibold text-ink-400 uppercase tracking-wider mb-1.5">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"
               class="w-full bg-white/5 border border-white/10 text-white placeholder-ink-500 rounded-lg px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500 outline-none transition" />
      </div>

      <button type="submit"
              class="w-full bg-accent-500 hover:bg-accent-600 text-ink-900 font-bold rounded-lg px-4 py-2.5 text-sm active:scale-[0.99] transition shadow-lg shadow-accent-500/30">
        Sign In
      </button>
    </form>

    <p class="text-center text-[11px] text-ink-500 mt-6">Shubham Tradelink © 2026</p>
  </div>

</body>
</html>
