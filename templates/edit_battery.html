{% extends "base.html" %}
{% block title %}Edit Battery — Shubham Tradelink{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Edit Battery</h1>

<form method="POST" action="/inventory/edit/{{ battery._id }}"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5 max-w-lg">

  <div>
    <label for="brand" class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
    <input type="text" id="brand" name="brand" required value="{{ battery.brand }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="model" class="block text-sm font-medium text-gray-700 mb-1">Model</label>
    <input type="text" id="model" name="model" required value="{{ battery.model }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity</label>
    <input type="number" id="stock" name="stock" required min="0" value="{{ battery.stock }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label for="purchase_price" class="block text-sm font-medium text-gray-700 mb-1">Purchase Price (₹)</label>
      <input type="number" step="0.01" id="purchase_price" name="purchase_price" required min="0" value="{{ battery.purchase_price }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    </div>
    <div>
      <label for="selling_price" class="block text-sm font-medium text-gray-700 mb-1">Selling Price (₹)</label>
      <input type="number" step="0.01" id="selling_price" name="selling_price" required min="0" value="{{ battery.selling_price }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
    </div>
  </div>

  <div>
    <label for="warranty_months" class="block text-sm font-medium text-gray-700 mb-1">Warranty Period (months)</label>
    <input type="number" id="warranty_months" name="warranty_months" required min="0" value="{{ battery.warranty_months or 12 }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div class="flex gap-3">
    <button type="submit"
            class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm transition">
      Update Battery
    </button>
    <a href="/inventory"
       class="flex-1 text-center border border-gray-300 text-gray-700 font-medium rounded-lg px-4 py-2.5 text-sm hover:bg-gray-50 transition">
      Cancel
    </a>
  </div>
</form>
{% endblock %}
