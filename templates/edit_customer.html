{% extends "base.html" %}
{% block title %}Edit Customer — Shubham Tradelink{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Edit Customer</h1>

<form method="POST" action="/customers/edit/{{ customer._id }}"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-6 space-y-5 max-w-lg mx-auto">

  <div>
    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
    <input type="text" id="name" name="name" required value="{{ customer.name }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
    <input type="tel" id="phone" name="phone" required value="{{ customer.phone }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="vehicle" class="block text-sm font-medium text-gray-700 mb-1">Vehicle</label>
    <input type="text" id="vehicle" name="vehicle" required value="{{ customer.vehicle }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div>
    <label for="vehicle_number" class="block text-sm font-medium text-gray-700 mb-1">Vehicle Number</label>
    <input type="text" id="vehicle_number" name="vehicle_number" required value="{{ customer.vehicle_number }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>

  <div class="flex gap-3">
    <button type="submit"
            class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm active:scale-95 hover:-translate-y-0.5 transition-all duration-200">
      Update Customer
    </button>
    <a href="/customers"
       class="flex-1 text-center border border-gray-300 text-gray-700 font-medium rounded-lg px-4 py-2.5 text-sm hover:bg-gray-50 transition">
      Cancel
    </a>
  </div>
</form>
{% endblock %}
