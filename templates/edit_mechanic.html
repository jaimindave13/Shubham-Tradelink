{% extends "base.html" %}
{% block title %}Edit Mechanic — Shubham Tradelink{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Edit Mechanic</h1>

<form method="POST" action="/mechanics/edit/{{ mechanic._id }}"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-6 space-y-5 max-w-lg mx-auto">
  <div>
    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
    <input type="text" id="name" name="name" required value="{{ mechanic.name }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <div>
    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
    <input type="tel" id="phone" name="phone" required value="{{ mechanic.phone }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <div>
    <label for="shop_name" class="block text-sm font-medium text-gray-700 mb-1">Shop / Garage Name</label>
    <input type="text" id="shop_name" name="shop_name" value="{{ mechanic.shop_name or '' }}"
           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-300 focus:border-brand-500 outline-none transition" />
  </div>
  <div class="flex gap-3">
    <button type="submit"
            class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg px-4 py-2.5 text-sm active:scale-95 hover:-translate-y-0.5 transition-all duration-200">
      Update
    </button>
    <a href="/mechanics"
       class="flex-1 text-center border border-gray-300 text-gray-700 font-medium rounded-lg px-4 py-2.5 text-sm hover:bg-gray-50 transition">
      Cancel
    </a>
  </div>
</form>
{% endblock %}
